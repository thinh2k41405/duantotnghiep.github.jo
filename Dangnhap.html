<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập & Đăng ký</title>
    <link rel="stylesheet" href="https://pro.fontawesome.com/releases/v5.10.0/css/all.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="login-container login-card">
        <div id="message-box"></div>

        <form class="login-form" id="loginForm">
            <h2>Đăng Nhập</h2>
            <div class="input-group">
                <label>Tên đăng nhập</label>
                <input type="text" id="txtUsername" required placeholder="Nhập tài khoản">
            </div>
            <div class="input-group">
                <label>Mật khẩu</label>
                <input type="password" id="txtPassword" required placeholder="Nhập mật khẩu">
            </div>
            <button type="button" id="btnLogin" class="login-btn">Đăng Nhập</button>
            <p style="text-align: center; margin-top: 15px;">
                Chưa có tài khoản? <a href="#" id="showRegister">Đăng ký ngay</a>
            </p>
        </form>

        <form class="login-form" id="registerForm" style="display: none;">
            <h2>Đăng Ký Tài Khoản</h2>
            <div class="input-group">
                <label>Tên đăng nhập</label>
                <input type="text" id="regUsername" required placeholder="Tạo tên đăng nhập">
            </div>
            <div class="input-group">
                <label>Email</label>
                <input type="email" id="regEmail" required placeholder="Ví dụ: abc@gmail.com">
            </div>
            <div class="input-group">
                <label>Mật khẩu</label>
                <input type="password" id="regPassword" required placeholder="Tạo mật khẩu">
            </div>
            <div class="input-group">
                <label>Họ và Tên</label>
                <input type="text" id="regFullName" required placeholder="Nhập tên của bạn">
            </div>
            <button type="button" id="btnRegister" class="login-btn">Xác Nhận Đăng Ký</button>
            <p style="text-align: center; margin-top: 15px;">
                Đã có tài khoản? <a href="#" id="showLogin">Quay lại Đăng nhập</a>
            </p>
        </form>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
